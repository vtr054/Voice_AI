services:
  voice-agent:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - sqlite-data:/data
    network_mode: host

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  sqlite-data:
